<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ALARM CLOCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Animated background -->
  <canvas id="bg-canvas"></canvas>
  <div class="noise"></div>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <span class="logo-dot"></span>
        ALARM CLOCK
      </div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span id="alarm-count-label">アラームなし</span>
      </div>
    </header>

    <!-- Clock -->
    <section class="clock-wrap">
      <div class="clock-card">
        <div class="clock-bg-blur"></div>

        <div class="flip-clock" id="flip-clock">
          <div class="flip-group" id="flip-h1"><div class="flip-digit">0</div></div>
          <div class="flip-group" id="flip-h2"><div class="flip-digit">0</div></div>
          <div class="flip-sep">:</div>
          <div class="flip-group" id="flip-m1"><div class="flip-digit">0</div></div>
          <div class="flip-group" id="flip-m2"><div class="flip-digit">0</div></div>
          <div class="flip-sep">:</div>
          <div class="flip-group" id="flip-s1"><div class="flip-digit">0</div></div>
          <div class="flip-group" id="flip-s2"><div class="flip-digit">0</div></div>
        </div>

        <div class="clock-sub">
          <span id="date-label"></span>
          <span class="clock-sub-sep">|</span>
          <span id="period-label"></span>
        </div>

        <!-- Progress bar for seconds -->
        <div class="sec-bar-wrap">
          <div class="sec-bar" id="sec-bar"></div>
        </div>
      </div>
    </section>

    <!-- Add alarm -->
    <section class="add-section">
      <div class="add-card">
        <div class="add-card-label">NEW ALARM</div>
        <div class="add-row">
          <div class="time-input-wrap">
            <input type="time" id="alarm-time" class="time-input"/>
            <div class="time-input-line"></div>
          </div>
          <button id="set-btn" class="set-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            追加
          </button>
        </div>
      </div>
    </section>

    <!-- Alarm list -->
    <section class="list-section">
      <div id="alarm-list"></div>
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <p>アラームをセットしてください</p>
      </div>
    </section>

  </div>

  <!-- Ringing overlay -->
  <div id="ringing-overlay" class="ringing-overlay hidden">
    <div class="ringing-card">
      <div class="ringing-rings">
        <div class="rr rr1"></div>
        <div class="rr rr2"></div>
        <div class="rr rr3"></div>
        <div class="rr rr4"></div>
      </div>
      <div class="ringing-bell">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </div>
      <div class="ringing-label">ALARM</div>
      <div class="ringing-time" id="ringing-time-label"></div>
      <div class="ringing-waveform">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <button id="dismiss-btn" class="dismiss-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        止める
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
