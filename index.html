<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シンプルアラーム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>シンプルアラーム</h1>

    <div class="clock">
      <span id="current-time">--:--:--</span>
    </div>

    <div class="alarm-form">
      <label for="alarm-time">アラーム時刻</label>
      <input type="time" id="alarm-time" />
      <button id="set-btn">セット</button>
    </div>

    <div id="alarm-list" class="alarm-list"></div>

    <div id="alert-overlay" class="alert-overlay hidden">
      <div class="alert-box">
        <div class="alert-icon">⏰</div>
        <p>アラームの時間です！</p>
        <button id="dismiss-btn">閉じる</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
